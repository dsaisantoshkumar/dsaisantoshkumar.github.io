<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOOGL - Alphabet (Google) | Stock Monitor Pro</title>
<link rel="stylesheet" href="../css/style.css">
<style>.back-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:12px;text-decoration:none;margin-bottom:1rem}.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem}.stat-card{background:#fff;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;text-align:center}.stat-label{font-size:10px;color:var(--color-text-secondary);margin-bottom:4px}.stat-value{font-size:22px;font-weight:600}.price-hero{text-align:center;padding:20px 0 10px}.ph-ticker{font-size:13px;color:var(--color-text-secondary);font-weight:500}.ph-price{font-size:42px;font-weight:700;margin:4px 0}.ph-change{font-size:14px;font-weight:500}.ai-block{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px;font-size:12px;line-height:1.75;margin-bottom:1rem}.ai-label{font-size:10px;color:var(--color-text-secondary);margin-bottom:6px;font-weight:500;text-transform:uppercase}</style>
</head>
<body>
<div class="app">
<a href="../index.html" class="back-btn">Back to Dashboard</a>
<div class="card price-hero"><div class="ph-ticker">GOOGL - Alphabet (Google)</div><div class="ph-price" id="ph-price">$--</div><div class="ph-change" id="ph-change">--</div><div style="font-size:10px;color:var(--color-text-secondary);margin-top:4px" id="ph-updated">Loading...</div></div>
<div class="stat-grid"><div class="stat-card"><div class="stat-label">Analyst target</div><div class="stat-value up" id="s-target">--</div><div id="s-rating" style="font-size:10px;color:var(--color-text-secondary)">--</div></div><div class="stat-card"><div class="stat-label">RSI Momentum</div><div class="stat-value" id="s-rsi">--</div><div id="s-rsi-label" style="font-size:10px;color:var(--color-text-secondary)">--</div></div><div class="stat-card"><div class="stat-label">20-day avg</div><div class="stat-value" id="s-ma20">--</div><div id="s-mapos" style="font-size:10px">--</div></div><div class="stat-card"><div class="stat-label">20-day forecast</div><div class="stat-value" id="s-fc">--</div><div id="s-fc-dir" style="font-size:10px">--</div></div><div class="stat-card"><div class="stat-label">Risk score</div><div class="stat-value" id="s-risk">--</div><div id="s-risk-label" style="font-size:10px">--</div></div><div class="stat-card"><div class="stat-label">Sentiment</div><div class="stat-value" id="s-sent">--</div><div id="s-sent-label" style="font-size:10px">--</div></div></div>
<div class="card"><div class="hdr"><span class="htitle">Price chart</span><div class="tfs"><button class="tf on" onclick="setTF('1D',this)">1D</button><button class="tf" onclick="setTF('1W',this)">1W</button><button class="tf" onclick="setTF('1M',this)">1M</button></div></div><div class="chartw" style="height:240px"><canvas id="pc"></canvas></div></div>
<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:10px">Signal breakdown</div><div class="srow" id="srow"></div><div id="verdict" class="verdict v-hold" style="margin-top:8px"><div class="vtitle">Loading...</div><div class="vbody"></div></div></div>
<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:10px">AI Analysis - Qwen2.5 7B (LM Studio)</div><div class="ai-block" id="ai-analysis"><div class="ai-label">Generating...</div></div><button class="btn-s" onclick="refreshAI()">Re-run AI</button></div>
<div class="card"><div class="hdr"><span class="htitle">Latest news - GOOGL</span></div><div id="nlist"></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="../js/data.js"></script>
<script src="../js/signals.js"></script>
<script src="../js/lmstudio.js"></script>
<script>
const DETAIL_STOCK='GOOGL';let tf='1D',priceChart=null,liveP={},history={};let settings=JSON.parse(localStorage.getItem('smv7_cfg')||'{"name":"Sai Santosh","email":"saisantoshkumar29@gmail.com"}');let aiHistory=[];
async function initDetail(){const base=TODAY[DETAIL_STOCK]?.price||100;liveP[DETAIL_STOCK]=base;const vol=base*.006;history[DETAIL_STOCK]={'1D':genHist(base,28,vol*.4),'1W':genHist(base,35,vol*.85),'1M':genHist(base,30,vol*1.6)};try{const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/'+DETAIL_STOCK+'?interval=1d&range=1d');if(r.ok){const d=await r.json();const p=d?.chart?.result?.[0]?.meta?.regularMarketPrice;if(p&&p>0){liveP[DETAIL_STOCK]=Math.round(p*100)/100;history[DETAIL_STOCK]['1D'][history[DETAIL_STOCK]['1D'].length-1]=liveP[DETAIL_STOCK];}}}catch(e){}renderStats();renderChart();renderNews2();await renderAI();document.getElementById('ph-updated').textContent='Updated '+new Date().toLocaleTimeString();}
function renderStats(){const td=TODAY[DETAIL_STOCK]||{};const p=liveP[DETAIL_STOCK]||td.price||0;const chg=td.change||0;const pct=td.pct||0;const sig=SIG(DETAIL_STOCK);const arr=history[DETAIL_STOCK]?.[tf]||[];const vol=VOL(arr);const dir=sig.ma5>sig.ma20?1:-1;const fc=Math.round((sig.cur*(1+(dir*(vol/Math.max(sig.cur,1))*20*0.28)))*100)/100;const risk=Math.min(10,Math.max(1,Math.round(5-sig.score*1.3)));const sent=SENT(DETAIL_STOCK);const vd=VERDICT(DETAIL_STOCK,sig);document.getElementById('ph-price').textContent='$'+p.toFixed(2);document.getElementById('ph-price').className='ph-price '+(chg>=0?'up':'dn');document.getElementById('ph-change').textContent=(chg>=0?'+':'')+chg.toFixed(2)+' ('+(pct>=0?'+':'')+pct.toFixed(2)+'%) today';document.getElementById('ph-change').className='ph-change '+(chg>=0?'up':'dn');document.getElementById('s-target').textContent='$'+(td.target||'--');document.getElementById('s-rating').textContent=td.rating||'--';document.getElementById('s-rsi').textContent=sig.rsi+'/100';document.getElementById('s-rsi').className='stat-value '+(sig.rsi>70?'dn':sig.rsi<30?'up':'nu');document.getElementById('s-rsi-label').textContent=sig.rsi>70?'Overbought':sig.rsi<30?'Oversold':'Neutral';document.getElementById('s-ma20').textContent='$'+(sig.ma20||0).toFixed(2);document.getElementById('s-mapos').textContent=p>(sig.ma20||0)?'Above avg':'Below avg';document.getElementById('s-fc').textContent='$'+fc.toFixed(2);document.getElementById('s-fc').className='stat-value '+(fc>=p?'up':'dn');document.getElementById('s-fc-dir').textContent=fc>=p?'Upward':'Downward';document.getElementById('s-risk').textContent=risk+'/10';document.getElementById('s-risk').className='stat-value '+(risk<=3?'up':risk>=7?'dn':'nu');document.getElementById('s-risk-label').textContent=risk<=3?'Low risk':risk<=6?'Medium':'High risk';document.getElementById('s-sent').textContent=(sent>0?'+':'')+sent;document.getElementById('s-sent').className='stat-value '+(sent>0.1?'up':sent<-0.1?'dn':'nu');document.getElementById('s-sent-label').textContent=sent>0.2?'Positive':sent<-0.1?'Negative':'Mixed';document.getElementById('srow').innerHTML=sig.pills.map(p=>'<span class="spill '+p.c+'">'+p.t+'</span>').join('');const vel=document.getElementById('verdict');vel.className='verdict '+vd.cls;vel.innerHTML='<div class="vtitle">'+vd.icon+' - '+vd.title+'</div><div class="vbody">'+vd.body+'</div>';}
function renderChart(){const arr=history[DETAIL_STOCK]?.[tf]||[];if(!arr.length)return;const color=STOCKS[DETAIL_STOCK]?.color||'#378add';const labels=getLabels(tf).slice(0,arr.length);const ma20=arr.map((_,i)=>i<20?null:MA(arr.slice(0,i+1),20));const sig=SIG(DETAIL_STOCK);const vol=VOL(arr);const dir=sig.ma5>sig.ma20?1:-1;const fcBase=arr[arr.length-1];const fcArr=Array.from({length:20},(_,i)=>Math.round((fcBase*(1+(dir*(vol/Math.max(fcBase,1))*(i+1)*0.28)))*100)/100);if(priceChart)priceChart.destroy();priceChart=new Chart(document.getElementById('pc'),{type:'line',data:{labels:[...labels,...Array.from({length:20},(_,i)=>'F'+(i+1))],datasets:[{label:'Price',data:[...arr,...Array(20).fill(null)],borderColor:color,backgroundColor:color+'14',fill:true,tension:0.3,pointRadius:0,borderWidth:2},{label:'20-day avg',data:[...ma20,...Array(20).fill(null)],borderColor:'#ef9f27',fill:false,tension:0.3,pointRadius:0,borderWidth:1.5,borderDash:[4,3]},{label:'Forecast',data:[...Array(arr.length-1).fill(null),fcBase,...fcArr],borderColor:'#d84a30',fill:false,tension:0.3,pointRadius:0,borderWidth:1.5,borderDash:[6,3]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888',font:{size:10},maxTicksLimit:9}},y:{ticks:{color:'#888',font:{size:10},callback:v=>'$'+v.toFixed(0)}}}}});}
function renderNews2(){const items=[...(NEWS.MARKET||[]),...(NEWS[DETAIL_STOCK]||[])].sort((a,b)=>b.s-a.s);document.getElementById('nlist').innerHTML=items.map(n=>'<div class="nitem '+(n.s>0.2?'n-bull':n.s<-0.1?'n-bear':'n-neu')+'"><div class="nh">'+n.h+'</div><div class="nm"><span class="badge '+(n.s>0.1?'b-up':n.s<-0.1?'b-dn':'b-nu')+'">'+n.l+'</span><span style="font-size:10px;color:var(--color-text-secondary)">'+n.src+' - '+n.date+'</span></div></div>').join('');}
async function renderAI(){const el=document.getElementById('ai-analysis');el.innerHTML='<div class="ai-label">Generating AI analysis...</div>';try{const sig=SIG(DETAIL_STOCK);const vd=VERDICT(DETAIL_STOCK,sig);const td=TODAY[DETAIL_STOCK]||{};const reply=await callLMStudio([{role:'system',content:'You are a stock analyst. Be concise.'},{role:'user',content:'Analyse GOOGL ('+STOCKS[DETAIL_STOCK]?.name+'): price=$'+(liveP[DETAIL_STOCK]||td.price||0).toFixed(2)+', RSI='+sig.rsi+', score='+sig.score+'/4, verdict='+vd.icon+'. Give 3-sentence analysis with recommendation.'}],200);el.innerHTML='<div class="ai-label">AI Analysis - '+new Date().toLocaleTimeString()+'</div>'+reply;}catch(err){el.innerHTML='<div class="ai-label">AI Analysis</div>LM Studio not reachable: '+err.message;}}
function refreshAI(){renderAI();}
function setTF(t,btn){tf=t;document.querySelectorAll('.tf').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderStats();renderChart();}
initDetail();
</script>
</body>
</html>
