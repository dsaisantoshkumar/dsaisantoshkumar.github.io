Id("pu").textContent="Updated "+new Date().toLocaleTimeString();}function rS(){const td=TODAY[S]||{};const p=lP[S]||td.price||0;const chg=td.change||0;const pct=td.pct||0;const sig=SIG(S);const arr=hs[S]?.[tf]||[];const vol=VOL(arr);const dir=sig.ma5>sig.ma20?1:-1;const fc=Math.round((sig.cur*(1+(dir*(vol/Math.max(sig.cur,1))*20*0.28)))*100)/100;const risk=Math.min(10,Math.max(1,Math.round(5-sig.score*1.3)));const sent=SENT(S);const vdv=VERDICT(S,sig);document.getElementById("pp").textContent="$"+p.toFixed(2);document.getElementById("pp").className="php "+(chg>=0?"up":"dn");document.getElementById("pc2").textContent=(chg>=0?"+":"")+chg.toFixed(2)+" ("+(pct>=0?"+":"")+pct.toFixed(2)+"%)";document.getElementById("st").textContent="$"+(td.target||"--");document.getElementById("sr").textContent=td.rating||"--";document.getElementById("srsi").textContent=sig.rsi+"/100";document.getElementById("srsi").className="sv "+(sig.rsi>70?"dn":sig.rsi<30?"up":"nu");document.getElementById("srl").textContent=sig.rsi>70?"Overbought":sig.rsi<30?"Oversold":"Neutral";document.getElementById("sma").textContent="$"+(sig.ma20||0).toFixed(2);document.getElementById("smp").textContent=p>(sig.ma20||0)?"Above avg":"Below avg";document.getElementById("sfc").textContent="$"+fc.toFixed(2);document.getElementById("sfc").className="sv "+(fc>=p?"up":"dn");document.getElementById("sfd").textContent=fc>=p?"Upward":"Downward";document.getElementById("srk").textContent=risk+"/10";document.getElementById("srk").className="sv "+(risk<=3?"up":risk>=7?"dn":"nu");document.getElementById("srkl").textContent=risk<=3?"Low":risk<=6?"Med":"High";document.getElementById("sst").textContent=(sent>0?"+":"")+sent;document.getElementById("sst").className="sv "+(sent>0.1?"up":sent<-0.1?"dn":"nu");document.getElementById("sstl").textContent=sent>0.2?"Positive":sent<-0.1?"Negative":"Mixed";document.getElementById("sgrow").innerHTML=sig.pills.map(p=>"<span class=\"spill "+p.c+"\">"+p.t+"</span>").join("");const vel=document.getElementById("vd");vel.className="verdict "+vdv.cls;vel.innerHTML="<div class=\"vtitle\">"+vdv.icon+" - "+vdv.title+"</div><div class=\"vbody\">"+vdv.body+"</div>";}function rC(){const arr=hs[S]?.[tf]||[];if(!arr.length)return;const col=STOCKS[S]?.color||"#378add";const lb=getLabels(tf).slice(0,arr.length);const m20=arr.map((_,i)=>i<20?null:MA(arr.slice(0,i+1),20));const sig=SIG(S);const vol=VOL(arr);const dir=sig.ma5>sig.ma20?1:-1;const fb=arr[arr.length-1];const fa=Array.from({length:20},(_,i)=>Math.round((fb*(1+(dir*(vol/Math.max(fb,1))*(i+1)*0.28)))*100)/100);if(ch)ch.destroy();ch=new Chart(document.getElementById("myc"),{type:"line",data:{labels:[...lb,...Array.from({length:20},(_,i)=>"F"+(i+1))],datasets:[{data:[...arr,...Array(20).fill(null)],borderColor:col,backgroundColor:col+"14",fill:true,tension:0.3,pointRadius:0,borderWidth:2},{data:[...m20,...Array(20).fill(null)],borderColor:"#ef9f27",fill:false,tension:0.3,pointRadius:0,borderWidth:1.5,borderDash:[4,3]},{data:[...Array(arr.length-1).fill(null),fb,...fa],borderColor:"#d84a30",fill:false,tension:0.3,pointRadius:0,borderWidth:1.5,borderDash:[6,3]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#888",font:{size:10},maxTicksLimit:9}},y:{ticks:{color:"#888",font:{size:10},callback:v=>"$"+v.toFixed(0)}}}}});}function rN(){const items=[...(NEWS.MARKET||[]),...(NEWS[S]||[])].sort((a,b)=>b.s-a.s);document.getElementById("nl").innerHTML=items.map(n=>"<div class=\"nitem "+(n.s>0.2?"n-bull":n.s<-0.1?"n-bear":"n-neu")+"\"><div class=\"nh\">"+n.h+"</div><div class=\"nm\"><span class=\"badge "+(n.s>0.1?"b-up":n.s<-0.1?"b-dn":"b-nu")+"\">" +n.l+"</span><span style=\"font-size:10px;color:var(--color-text-secondary)\">"+n.src+" - "+n.date+"</span></div></div>").join("");}async function rAI(){const el=document.getElementById("ai");el.textContent="Generating...";try{const sig=SIG(S);const vdv=VERDICT(S,sig);const td=TODAY[S]||{};const r=await callLMStudio([{role:"system",content:"Stock analyst. Concise."},{role:"user",content:"NVDA: $"+(lP[S]||td.price||0).toFixed(2)+", RSI="+sig.rsi+", "+vdv.icon+". 3 sentences, Buy/Hold/Sell."}],150);el.style.fontStyle="normal";el.innerHTML="<div style=\"font-size:10px;color:var(--color-text-secondary);margin-bottom:4px\">"+new Date().toLocaleTimeString()+"</div>"+r;}catch(e){el.textContent="LM Studio offline: "+e.message;el.style.fontStyle="normal";}}function sT(t2,btn){tf=t2;document.querySelectorAll(".tf").forEach(b=>b.classList.remove("on"));btn.classList.add("on");rS();rC();}init();<\/script></body></html>
